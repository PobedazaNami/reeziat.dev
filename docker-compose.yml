services:
  web:
    build: .
    container_name: reeziat-portfolio
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - VIRTUAL_HOST=reeziat.dev
      - LETSENCRYPT_HOST=reeziat.dev
      - LETSENCRYPT_EMAIL=admin@reeziat.dev
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  default:
    name: nginx-proxy
    external: true
